AWSTemplateFormatVersion: "2010-09-09"
Description: Empty deployment template for validating AWS CLI credentials, region, and CloudFormation access.

Parameters:
  CreateMarker:
    Type: String
    Default: "false"
    AllowedValues:
      - "false"
      - "true"
    Description: Keep false for an empty deployment.

Conditions:
  CreateNothing:
    Fn::Equals:
      - Ref: CreateMarker
      - "true"

Resources:
  EmptyDeploymentMarker:
    Type: AWS::CloudFormation::WaitConditionHandle
    Condition: CreateNothing
